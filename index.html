<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Snake Game</title>
    <link rel="stylesheet" href="theem.css" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main>
      <section>
        <div class="infos">
          <div class="high-score">
            High Score: <span class="highScore">0</span>
          </div>

          <div class="score">Score: <span class="counter">0</span></div>
          <div class="timer">Timer: <span class="">00-00</span></div>
        </div>
        <div class="board"></div>
      </section>
      <div class="modal showModal showModalHome">
        <div class="notice">
          <h3>Game Over</h3>
          <h2>Final Score: <span class="finalScore"> 0</span></h2>
          <button id="reStart">Restart</button>
        </div>
        <div class="modalHome">
          <h3>Welcome back Chief</h3>
          
          <button id="start">Start</button>
        </div>
        <div class="direction">
          <p>Press Any Arrow Key</p>
        </div>
      </div>
    </main>

    <script src="script.js"></script>
  </body>
</html>
